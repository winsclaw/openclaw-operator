apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openclawnodes.apps.openclaw.io
spec:
  group: apps.openclaw.io
  names:
    kind: OpenClawNode
    listKind: OpenClawNodeList
    plural: openclawnodes
    singular: openclawnode
    shortNames:
    - ocn
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.url
      name: URL
      type: string
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    schema:
      openAPIV3Schema:
        type: object
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - runtimeSecretRef
            properties:
              runtimeSecretRef:
                type: object
                required:
                - name
                properties:
                  name:
                    type: string
                    minLength: 1
              image:
                type: object
                properties:
                  repository:
                    type: string
                  tag:
                    type: string
                  pullPolicy:
                    type: string
              gateway:
                type: object
                properties:
                  port:
                    type: integer
                    format: int32
                  serviceType:
                    type: string
                  trustedProxies:
                    type: array
                    items:
                      type: string
              ingress:
                type: object
                properties:
                  enabled:
                    type: boolean
                  className:
                    type: string
                  host:
                    type: string
                  tlsSecretName:
                    type: string
                  annotations:
                    type: object
                    additionalProperties:
                      type: string
              storage:
                type: object
                properties:
                  size:
                    type: string
                  storageClassName:
                    type: string
                  accessModes:
                    type: array
                    items:
                      type: string
              caBundle:
                type: object
                required:
                - configMapName
                properties:
                  configMapName:
                    type: string
              chromium:
                type: object
                properties:
                  enabled:
                    type: boolean
                  image:
                    type: object
                    properties:
                      repository:
                        type: string
                      tag:
                        type: string
                      pullPolicy:
                        type: string
              configMode:
                type: string
                enum:
                - merge
                - overwrite
              serviceAccountName:
                type: string
          status:
            type: object
            properties:
              observedGeneration:
                type: integer
                format: int64
              phase:
                type: string
              url:
                type: string
              serviceName:
                type: string
              readyReplicas:
                type: integer
                format: int32
              conditions:
                type: array
                items:
                  type: object
                  required:
                  - type
                  - status
                  - reason
                  - message
                  - lastTransitionTime
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    reason:
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      type: integer
                      format: int64
                    lastTransitionTime:
                      type: string
                      format: date-time
